name: Generate announcer voice

# Run this from the GitHub website: Actions tab → "Generate announcer voice" → Run workflow.
# It creates the deep-narrator MP3 clips (free, via edge-tts) and commits them back
# to the repo automatically — no local setup, no API key.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  voice:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install edge-tts
        run: pip install edge-tts

      - name: Generate voice clips
        run: python tools/generate-voice.py

      - name: Commit the clips
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add voice/*.mp3
          if git diff --staged --quiet; then
            echo "No new clips to commit."
          else
            git commit -m "Generate announcer voice clips"
            git push
          fi
